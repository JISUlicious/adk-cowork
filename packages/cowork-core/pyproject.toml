[project]
name = "cowork-core"
version = "0.1.0"
description = "Cowork core — ADK agents, tools, policy, session, memory, workspace"
requires-python = ">=3.12"
dependencies = [
    "google-adk>=0.2",
    "litellm>=1.40",
    "pydantic>=2.8",
    "httpx>=0.27",
    "ddgs>=0.9",
    "pyyaml>=6",
    "python-dotenv>=1",
    "python-docx>=1.1",
    "openpyxl>=3.1",
    "pandas>=2",
    "pypdf>=4",
    "matplotlib>=3.9",
    "markdown-it-py>=3",
    "Pillow>=10",
    "tomli-w>=1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cowork_core"]
