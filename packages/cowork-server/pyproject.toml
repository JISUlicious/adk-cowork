[project]
name = "cowork-server"
version = "0.1.0"
description = "Cowork FastAPI server: HTTP + WebSocket transport around the ADK runner"
requires-python = ">=3.12"
dependencies = [
    "cowork-core",
    "fastapi>=0.115",
    "python-multipart>=0.0.9",
    "uvicorn[standard]>=0.30",
]

[project.scripts]
cowork-server = "cowork_server.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cowork_server"]

[tool.uv.sources]
cowork-core = { workspace = true }
