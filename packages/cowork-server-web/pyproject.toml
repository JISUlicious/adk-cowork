[project]
name = "cowork-server-web"
version = "0.1.0"
description = "Cowork hosted server — multi-user backend for the web UI"
requires-python = ">=3.12"
dependencies = [
    "cowork-core",
    "cowork-server",
    "fastapi>=0.115",
    "uvicorn>=0.32",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cowork_server_web"]
